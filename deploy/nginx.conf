# AgriHub Fertigation — Nginx reverse proxy (HTTP only, no HTTPS/Certbot per spec).
# Copy to /etc/nginx/sites-available/fertigation, then:
#   sudo ln -s /etc/nginx/sites-available/fertigation /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name fertigasi.agrihub.id;

    # (Opsional) batasi ukuran body upload.
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:4500;   # Control App (Next.js)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket/upgrade (aman walau tidak dipakai).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
